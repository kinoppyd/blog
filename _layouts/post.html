<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    {% include head/base.html %}
    {% include prism/head.html %}
    {% include twitter/head.html %}
  </head>

  <body class="line-numbers relative flex min-h-screen flex-col font-noto antialiased">
    {% include components/header.html %}

    <main class="mx-auto w-full max-w-7xl flex-grow px-4 sm:px-6 lg:px-12">
      <article class="prose prose-base sm:prose-lg lg:prose-xl mx-auto my-8 w-full max-w-4xl sm:my-10">
        <div class="mb-10 text-center">
          <h1 class="text-3xl font-bold tracking-tight sm:text-4xl md:text-5xl">{{ page.title }}</h1>
          <p class="mt-4 text-sm text-gray-600 sm:text-base">posted at {{ page.date }} by {{ page.author }}</p>
          <div class="mt-6 flex flex-wrap items-center justify-center gap-4 sm:justify-end">
            <div>
              <a class="twitter-share-button" href="https://twitter.com/intent/tweet">Tweet</a>
            </div>
            <div>
              <a href="https://b.hatena.ne.jp/entry/" class="hatena-bookmark-button" data-hatena-bookmark-layout="basic-label-counter" data-hatena-bookmark-lang="ja" title="このエントリーをはてなブックマークに追加"><img src="https://b.st-hatena.com/images/v4/public/entry-button/button-only@2x.png" alt="このエントリーをはてなブックマークに追加" width="20" height="20" style="border: none;" /></a><script type="text/javascript" src="https://b.st-hatena.com/js/bookmark_button.js" charset="utf-8" async="async"></script>
            </div>
            <div>
              <a href='https://feedly.com/i/subscription/feed%2Fhttps%3A%2F%2Fkinoppyd.dev%2Fblog%2Ffeed.xm' target='_blank'><img id='feedlyFollow' src='https://s1.feedly.com/legacy/feedly-follow-rectangle-flat-small_2x.png' alt='follow us in feedly' width='66' height='20'></a>
            </div>
          </div>
        </div>
        {{ content }}
      </article>
    </main>

    {% include components/footer.html %}

    {% include prism/body.html %}
  </body>
</html>
